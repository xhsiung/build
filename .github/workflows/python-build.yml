name: python build use uv

on: [push, pull_request]

jobs:
  uv-example:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller --onefile --windowed main.py --name main.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-py-binary
          path: dist/*.exe
